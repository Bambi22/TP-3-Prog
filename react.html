<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Ejercicio 3 - React</title>
    <link rel="stylesheet" href="styles.css">
    
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone@7.29.7/babel.min.js"></script>

    <style>
        /* 🚀 DISEÑO EXCLUSIVO PARA EL EJERCICIO 3 (DIFERENTE AL 2) */
        .contenedor-react {
            background: #111e38; /* Un tono sutilmente distinto para la tarjeta */
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            margin-bottom: 30px;
        }

        /* Organizamos los inputs en una cuadrícula limpia */
        .grid-inputs {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .campo-formulario {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .campo-formulario label {
            font-weight: 500;
            color: #cbd5e1;
            font-size: 14px;
        }

        .campo-formulario input {
            padding: 12px;
            border-radius: 6px;
            background: #1e293b;
            border: 1px solid #334155;
            color: white;
            font-size: 15px;
            width: 100%;
            box-sizing: border-box;
        }

        .campo-formulario input:focus {
            border-color: #10b981;
            outline: none;
        }

        /* Botón abajo, grande y centrado */
        .btn-contenedor {
            display: flex;
            justify-content: flex-end;
        }

        .btn-react {
            background: #10b981;
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-react:hover {
            background: #059669;
        }
    </style>
</head>
<body>

    <nav>
        <a href="index.html">Inicio</a>
        <a href="flexbox.html">Ejercicio 1</a>
        <a href="Personas.html">Ejercicio 2</a>
    </nav>

    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        function App() {
            const [personas, setPersonas] = useState([]);
            const [form, setForm] = useState({ nombre: '', apellido: '', edad: '', altura: '', peso: '' });

            const agregarPersona = (e) => {
                e.preventDefault();
                const alturaM = parseFloat(form.altura) / 100;
                const imc = (parseFloat(form.peso) / (alturaM * alturaM)).toFixed(2);
                setPersonas([...personas, { ...form, id: Date.now(), imc }]);
                setForm({ nombre: '', apellido: '', edad: '', altura: '', peso: '' });
            };

            return (
                <div>
                    <h2>Registro de Personas con cálculo de IMC (React Component)</h2>
                    
                    {/* Estructura de tarjeta exclusiva */}
                    <div class="contenedor-react">
                        <form onSubmit={agregarPersona}>
                            <div class="grid-inputs">
                                <div class="campo-formulario">
                                    <label>Nombre</label>
                                    <input value={form.nombre} onChange={e => setForm({...form, nombre: e.target.value})} required />
                                </div>
                                <div class="campo-formulario">
                                    <label>Apellido</label>
                                    <input value={form.apellido} onChange={e => setForm({...form, apellido: e.target.value})} required />
                                </div>
                                <div class="campo-formulario">
                                    <label>Edad</label>
                                    <input type="number" value={form.edad} onChange={e => setForm({...form, edad: e.target.value})} required min="0" />
                                </div>
                                <div class="campo-formulario">
                                    <label>Altura (cm)</label>
                                    <input type="number" value={form.altura} onChange={e => setForm({...form, altura: e.target.value})} required min="0" />
                                </div>
                                <div class="campo-formulario">
                                    <label>Peso (kg)</label>
                                    <input type="number" value={form.peso} onChange={e => setForm({...form, peso: e.target.value})} required min="0" />
                                </div>
                            </div>
                            
                            <div class="btn-contenedor">
                                <button type="submit" class="btn-react">Agregar Atleta</button>
                            </div>
                        </form>
                    </div>

                    <table>
                        <thead>
                            <tr>
                                <th>Nombre</th>
                                <th>Apellido</th>
                                <th>Edad</th>
                                <th>Altura</th>
                                <th>Peso</th>
                                <th>IMC</th>
                                <th>Acción</th>
                            </tr>
                        </thead>
                        <tbody>
                            {personas.length === 0 ? (
                                <tr>
                                    <td colSpan="7" style={{ textAlign: 'center', color: '#888888', fontStyle: 'italic', padding: '30px' }}>
                                        Aún no hay personas registradas.
                                    </td>
                                </tr>
                            ) : (
                                personas.map(p => (
                                    <tr key={p.id}>
                                        <td>{p.nombre}</td>
                                        <td>{p.apellido}</td>
                                        <td>{p.edad} años</td>
                                        <td>{p.altura} cm</td>
                                        <td>{p.peso} kg</td>
                                        <td><strong>{p.imc}</strong></td>
                                        <td>
                                            <button onClick={() => setPersonas(personas.filter(x => x.id !== p.id))}>
                                                Eliminar
                                            </button>
                                        </td>
                                    </tr>
                                ))
                            )}
                        </tbody>
                    </table>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById("root"));
        root.render(<App />);
    </script>
</body>
</html>
