<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 2 - Personas (JS)</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <nav>
        <a href="index.html">Inicio</a>
    </nav>

    <h2>Registro de Personas con cálculo de IMC (Vanilla JS)</h2>
    
    <form id="form-personas">
        <div>
            <label>Nombre:</label>
            <input type="text" id="nombre" required>
        </div>
        <div>
            <label>Apellido:</label>
            <input type="text" id="apellido" required>
        </div>
        <div>
            <label>Edad:</label>
            <input type="number" id="edad" required min="0">
        </div>
        <div>
            <label>Altura (en metros, ej: 1.75):</label>
            <input type="number" id="altura" step="0.01" required min="0">
        </div>
        <div>
            <label>Peso (en kg, ej: 70):</label>
            <input type="number" id="peso" step="0.1" required min="0">
        </div>
        <button type="submit">Agregar Persona</button>
    </form>

    <table>
        <thead>
            <tr>
                <th>Nombre</th>
                <th>Apellido</th>
                <th>Edad</th>
                <th>Altura</th>
                <th>Peso</th>
                <th>IMC</th>
                <th>Acciones</th>
            </tr>
        </thead>
        <tbody id="tabla-body"></tbody>
    </table>

    <a href="index.html" class="back-link">← Volver al inicio</a>

    <script src="personas.js"></script>
</body>
</html>
